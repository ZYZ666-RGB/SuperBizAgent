server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md,log,json,yaml,yml,java,py,sql,pdf,docx,xlsx,pptx,html,htm

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

memory:
  enabled: true
  app-id: super_biz_agent
  window-size: 6
  summary-threshold: 12
  long-term:
    enabled: true
    top-k: 5
    min-confidence: 0.75
    min-importance: 0.6
    min-evidence-score: 0.8
    min-stability-score: 0.6
    min-future-usefulness-score: 0.7
  vector:
    enabled: true
    collection-name: user_memory
    dimension: 1024
  graph:
    enabled: true
    neo4j-uri: ${NEO4J_URI:bolt://localhost:7687}
    username: ${NEO4J_USERNAME:neo4j}
    password: ${NEO4J_PASSWORD:neo4j1234}
    top-k: 20
  consolidation:
    enabled: true
    importance-threshold: 0.7
    max-source-memories: 5
  forgetting:
    enabled: true
    max-age-days: 30
    min-importance: 0.2
    max-memories-per-user: 500

context:
  engineering:
    max-tokens: 6000
    reserved-output-tokens: 1200
    max-history-tokens: 1000
    max-memory-tokens: 1200
    max-rag-tokens: 2500
    max-tool-result-tokens: 1000
    min-relevance: 0.2
    relevance-weight: 0.65
    recency-weight: 0.2
    importance-weight: 0.15
    enable-compression: true
    recent-rounds: 6
    memory-top-k: 8
    rag-top-k: 6

# Spring AI Alibaba DashScope 配置
spring:
  datasource:
    url: "${MYSQL_URL:jdbc:mysql://localhost:3306/super_biz_agent?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}"
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-memory.sql
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}  # 从环境变量读取
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒
    
    # Spring AI MCP 客户端配置
    # 如果使用mock数据，请注释这部分内容
    mcp:
      client:
        enabled: true
        name: tencent-mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        sse:
          connections:
            tencent-cls:
              url: https://mcp-api.tencent-cloud.com
              sse-endpoint: ${TENCENT_CLS_SSE_ENDPOINT:}  # 完整的SSE端点路径

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}   # 从环境变量读取（用于自定义配置）
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  top-k: 3  # 检索返回的最相似文档数量
  model: "qwen3-max"  # 大语言模型名称
  storage:
    base-dir: ./rag-data
    upload-dir: ./rag-data/uploads
    markdown-dir: ./rag-data/parsed-md
    chunk-dir: ./rag-data/chunks
    log-dir: ./rag-data/logs
  parser:
    mode: external
    external-url: http://localhost:7001/parse
    fallback-to-tika: true
    timeout-seconds: 120
  chunk:
    target-tokens: 700
    max-tokens: 1000
    min-tokens: 80
    overlap-tokens: 100
    enable-parent-child: true
    enable-contextual-embedding: true
  embedding:
    model: text-embedding-v3
    batch-size: 16
    retry-times: 3
  index:
    vector-store: milvus
    delete-old-before-reindex: true
  online:
    default-namespace: default
    query:
      enable-analysis: true
      enable-rewrite: true
      rewrite-count: 3
      enable-hyde: false
    retrieve:
      enable-dense: true
      enable-sparse: true
      enable-hybrid: true
      dense-top-k: 20
      sparse-top-k: 20
      candidate-pool-size: 40
      final-top-k: 6
    fusion:
      type: rrf
      rrf-k: 60
    rerank:
      enabled: true
      provider: noop
      model: gte-rerank-v2
      timeout-seconds: 30
      fallback-to-fusion: true
    context:
      max-context-tokens: 4000
      enable-compression: true
      enable-parent-expansion: true
    verify:
      enabled: true
      min-confidence: 0.55
      require-citation: true
    debug:
      enable-trace: true

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: false  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: false  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）
